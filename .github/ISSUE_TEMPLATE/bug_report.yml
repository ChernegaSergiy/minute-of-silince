name: Bug Report
description: Report a reproducible bug or unexpected behaviour
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting the issue. Please fill in the fields below.

  - type: input
    id: version
    attributes:
      label: Application version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - Ubuntu 22.04
        - Ubuntu 24.04
        - Other (specify below)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the issue
      description: What happened? What was expected to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run the application
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs (if any)
      description: Paste the content of the `minute-of-silence.log` file from the configuration directory.
      render: shell
