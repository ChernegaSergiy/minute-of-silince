name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement", "triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Проблема або потреба
      description: Що саме незручно або чого не вистачає?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Пропоноване рішення
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Альтернативи, які ви розглядали
