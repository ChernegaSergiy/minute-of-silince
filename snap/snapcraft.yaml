# Snapcraft configuration for minute-of-silence
# This is the idiomatic way for core24 with gnome extension.

name: minute-of-silence
title: Хвилина мовчання
base: core24
version: '0.7.5'
icon: snap/gui/minute-of-silence.png
summary: Національна хвилина мовчання о 09:00
description: |
  Додаток для автоматизації загальнонаціональної хвилини мовчання.
  Синхронізується через NTP, вмикає звук та призупиняє інші медіаплеєри
  для вшанування пам'яті полеглих захисників та жертв війни.

license: Proprietary
contact: https://github.com/ChernegaSergiy/minute-of-silence/issues
issues: https://github.com/ChernegaSergiy/minute-of-silence/issues
website: https://khvylyna.pp.ua/
source-code: https://github.com/ChernegaSergiy/minute-of-silence
donation: https://savelife.in.ua/donate/

grade: stable
confinement: strict

platforms:
  amd64:

parts:
  minute-of-silence:
    plugin: nil
    source: .
    # Build dependencies for Tauri on Linux (Noble)
    build-packages:
      - libasound2-dev
      - libayatana-appindicator3-dev
      - libjack-dev
      - curl
      - wget
      - pkg-config
      - libssl-dev
      - libwebkit2gtk-4.1-dev
    build-snaps:
      - node/20/stable
      - rustup
    stage-packages:
      - libasound2-plugins
      - libpulse0
    override-build: |
      # Setup Rust environment
      export PATH="$PATH:$HOME/.cargo/bin"
      rustup default stable
      
      # Build the Tauri application
      npm install
      # Build only the binary, skip all bundling
      npm run tauri build -- --no-bundle
      
      # Move binary and resources
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin/audio
      cp src-tauri/target/release/minute-of-silence $SNAPCRAFT_PART_INSTALL/bin/
      cp src-tauri/audio/*.ogg $SNAPCRAFT_PART_INSTALL/bin/audio/
      
      # Copy custom minimal ALSA config (Pulse redirect)
      mkdir -p $SNAPCRAFT_PART_INSTALL/etc
      cp snap/local/asound.conf $SNAPCRAFT_PART_INSTALL/etc/asound.conf
      
      # Copy icons to meta/gui (standard for Snap icons)
      mkdir -p $SNAPCRAFT_PART_INSTALL/meta/gui
      cp snap/gui/minute-of-silence.png $SNAPCRAFT_PART_INSTALL/meta/gui/
      
      # Install desktop file to standard location (Snapcraft will use this for autostart)
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/applications
      cp snap/gui/minute-of-silence.desktop $SNAPCRAFT_PART_INSTALL/usr/share/applications/

apps:
  minute-of-silence:
    command: bin/minute-of-silence
    extensions: [gnome]
    desktop: usr/share/applications/minute-of-silence.desktop
    autostart: minute-of-silence.desktop
    environment:
      TAURI_ENV_RESOURCES_PATH: $SNAP/bin
      # Help ALSA find its configuration and plugins inside the snap
      ALSA_CONFIG_PATH: $SNAP/etc/asound.conf
      ALSA_PLUGIN_DIR: $SNAP/usr/lib/x86_64-linux-gnu/alsa-lib
    # Required permissions (interfaces)
    plugs:
      - network        # For NTP synchronization
      - network-bind   # For potential local server/sockets
      - audio-playback # For ceremony audio output
      - mpris          # For pausing other media players via D-Bus
      - screen-inhibit-control

layout:
  # Map internal Snap paths to where Tauri expects resources on Linux
  /usr/lib/minute-of-silence:
    bind: $SNAP/bin
