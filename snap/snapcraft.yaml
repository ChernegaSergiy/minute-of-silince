# Snapcraft configuration for minute-of-silence
# For more information, see: https://snapcraft.io/docs/snapcraft-yaml-reference

name: minute-of-silence
title: Хвилина мовчання
base: core24
version: '0.3.0'
summary: Національна хвилина мовчання о 09:00
description: |
  Додаток для автоматизації загальнонаціональної хвилини мовчання.
  Синхронізується через NTP, вмикає звук та призупиняє інші медіаплеєри
  для вшанування пам'яті полеглих захисників та жертв війни.

license: Proprietary
contact: https://github.com/ChernegaSergiy/minute-of-silence/issues
issues: https://github.com/ChernegaSergiy/minute-of-silence/issues
website: https://github.com/ChernegaSergiy/minute-of-silence
source-code: https://github.com/ChernegaSergiy/minute-of-silence
donation: https://savelife.in.ua/donate/

grade: stable
confinement: strict

platforms:
  amd64:
  arm64:

parts:
  minute-of-silence:
    plugin: nil
    source: .
    # Build dependencies for Tauri on Linux
    build-packages:
      - libasound2t64-dev
      - libgtk-3-dev
      - libsoup-3.0-dev
      - libwebkit2gtk-4.1-dev
      - libayatana-appindicator3-dev
      - libsecret-1-dev
      - librsvg2-dev
      - curl
      - wget
      - pkg-config
      - libssl-dev
    build-snaps:
      - node/20/stable
      - rustup
    override-build: |
      # Setup Rust environment
      export PATH="$PATH:$HOME/.cargo/bin"
      rustup default stable
      
      # Build the Tauri application
      npm install
      npm run tauri build -- --bundles deb
      
      # Move binary and resources to the snap's bin directory
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin/audio
      cp src-tauri/target/release/minute-of-silence $SNAPCRAFT_PART_INSTALL/bin/
      cp src-tauri/audio/*.ogg $SNAPCRAFT_PART_INSTALL/bin/audio/
      
      # Copy desktop assets (icon)
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/512x512/apps
      cp src-tauri/icons/icon.png $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/512x512/apps/minute-of-silence.png

apps:
  minute-of-silence:
    command: bin/minute-of-silence
    extensions: [gnome]
    # Required permissions (interfaces)
    plugs:
      - network        # For NTP synchronization
      - audio-playback # For ceremony audio output (ALSA)
      - mpris          # For pausing other media players via D-Bus
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - unity7
