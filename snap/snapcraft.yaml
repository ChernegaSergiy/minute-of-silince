# Snapcraft configuration for minute-of-silence
# For more information, see: https://snapcraft.io/docs/snapcraft-yaml-reference

name: minute-of-silence
title: Хвилина мовчання
base: core24
version: '0.5.1'
summary: Національна хвилина мовчання о 09:00
description: |
  Додаток для автоматизації загальнонаціональної хвилини мовчання.
  Синхронізується через NTP, вмикає звук та призупиняє інші медіаплеєри
  для вшанування пам'яті полеглих захисників та жертв війни.

license: Proprietary
contact: https://github.com/ChernegaSergiy/minute-of-silence/issues
issues: https://github.com/ChernegaSergiy/minute-of-silence/issues
website: https://github.com/ChernegaSergiy/minute-of-silence
source-code: https://github.com/ChernegaSergiy/minute-of-silence
donation: https://savelife.in.ua/donate/

grade: stable
confinement: strict

platforms:
  amd64:

parts:
  minute-of-silence:
    plugin: nil
    source: .
    # Build dependencies for Tauri on Linux
    build-packages:
      - libasound2-dev
      - libayatana-appindicator3-dev
      - curl
      - wget
      - pkg-config
      - libssl-dev
      - libwebkit2gtk-4.1-dev
    build-snaps:
      - node/20/stable
      - rustup
    stage-packages:
      - glib-networking
      - libasound2
      - libasound2-plugins
      - libpulse0
    override-build: |
      # Set SDK path based on architecture
      SDK_PATH="/snap/gnome-46-2404-sdk/current/usr/lib/$CRAFT_ARCH_TRIPLET"
      
      # Fix linker for Rust by providing explicit library search paths
      export RUSTFLAGS="-L $SDK_PATH -L /usr/lib/$CRAFT_ARCH_TRIPLET"
      
      # Also set standard linker variables
      export LIBRARY_PATH="$SDK_PATH${LIBRARY_PATH:+:$LIBRARY_PATH}"
      export LD_LIBRARY_PATH="$SDK_PATH${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
      export PKG_CONFIG_PATH="$SDK_PATH/pkgconfig:/snap/gnome-46-2404-sdk/current/usr/share/pkgconfig${PKG_CONFIG_PATH:+:$PKG_CONFIG_PATH}"
      
      # Setup Rust environment
      export PATH="$PATH:$HOME/.cargo/bin"
      rustup default stable
      
      # Build the Tauri application
      npm install
      # Build only the binary, skip all bundling (deb, appimage, etc.)
      npm run tauri build -- --no-bundle
      
      # Move binary and resources to the snap's bin directory
      mkdir -p $SNAPCRAFT_PART_INSTALL/bin/audio
      cp src-tauri/target/release/minute-of-silence $SNAPCRAFT_PART_INSTALL/bin/
      cp src-tauri/audio/*.ogg $SNAPCRAFT_PART_INSTALL/bin/audio/
      
      # Copy desktop assets (icon)
      mkdir -p $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/512x512/apps
      cp src-tauri/icons/icon.png $SNAPCRAFT_PART_INSTALL/usr/share/icons/hicolor/512x512/apps/minute-of-silence.png

apps:
  minute-of-silence:
    command: bin/minute-of-silence
    autostart: minute-of-silence.desktop
    extensions: [gnome]
    environment:
      TAURI_ENV_RESOURCES_PATH: $SNAP/bin
      ALSA_CONFIG_PATH: $SNAP/usr/share/alsa/alsa.conf
      ALSA_PLUGIN_DIR: $SNAP/usr/lib/$CRAFT_ARCH_TRIPLET/alsa-lib
      # Use pulse by default to avoid attempts to load OSS or other missing libs
      ALSA_PCM_DEFAULT: pulse
      ALSA_CTL_DEFAULT: pulse
    # Required permissions (interfaces)
    plugs:
      - network        # For NTP synchronization
      - network-bind   # For potential local server/sockets
      - audio-playback # For ceremony audio output
      - mpris          # For pausing other media players via D-Bus
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - unity7
      - opengl         # For WebKit/GPU acceleration
      - gsettings      # To access system settings (removes many GTK warnings)
