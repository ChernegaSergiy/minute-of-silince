app-id: ua.pp.khvylyna.MinuteOfSilence
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node20
command: MinuteOfSilence
finish-args:
  # Graphical access
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=ipc
  # Network (needed for NTP sync)
  - --share=network
  # Audio (Pulseaudio/Pipewire)
  - --socket=pulseaudio
  # MPRIS (Control other media players)
  - --talk-name=org.mpris.MediaPlayer2.*
  # Notifications
  - --talk-name=org.freedesktop.Notifications
  # System Settings
  - --metadata=X-DConf=comm/org/gnome/
  # Allow system tray icons
  - --talk-name=org.kde.StatusNotifierWatcher

modules:
  - shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json

  - name: minute-of-silence
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node20/bin:/usr/lib/sdk/rust-stable/bin
      build-args:
        - --share=network
    build-commands:
      # Use Rust and Node.js extensions
      - /usr/lib/sdk/node20/enable.sh
      - /usr/lib/sdk/rust-stable/enable.sh

      # Build the application
      - npm install
      - npm run tauri build -- --no-bundle

      # Install binary and resources
      - mkdir -p /app/bin/audio
      - cp src-tauri/target/release/MinuteOfSilence /app/bin/MinuteOfSilence
      - cp src-tauri/audio/*.ogg /app/bin/audio/

      # Install desktop entry, metainfo and icons
      - mkdir -p /app/share/applications
      - mkdir -p /app/share/metainfo
      - mkdir -p /app/share/icons/hicolor/512x512/apps
      - cp flatpak/ua.pp.khvylyna.MinuteOfSilence.desktop /app/share/applications/
      - cp flatpak/ua.pp.khvylyna.MinuteOfSilence.metainfo.xml /app/share/metainfo/
      - cp src-tauri/icons/icon.png /app/share/icons/hicolor/512x512/apps/ua.pp.khvylyna.MinuteOfSilence.png
    sources:
      - type: dir
        path: ..
