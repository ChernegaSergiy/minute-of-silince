<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Прапор України</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #111;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let W, H, cols, rows, mesh, t = 0;

const BLUE   = [0, 87, 183];
const YELLOW = [255, 215, 0];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  // mesh resolution: more columns for smoother waves
  cols = 120;
  rows = 60;
  buildMesh();
}

function buildMesh() {
  mesh = [];
  for (let r = 0; r <= rows; r++) {
    mesh[r] = [];
    for (let c = 0; c <= cols; c++) {
      mesh[r][c] = { x: 0, y: 0 };
    }
  }
}

// Perlin-like smooth noise via sine harmonics
function wave(cx, cy, time) {
  const nx = cx / cols; // 0..1
  const ny = cy / rows; // 0..1

  // Horizontal waves travelling left→right, attenuated at left edge
  const leftAtten = nx; // cloth fixed at left, free at right
  const dx =
    leftAtten * (
      Math.sin(nx * 6.2  - time * 2.1 + ny * 1.8) * 14 +
      Math.sin(nx * 12.4 - time * 3.4 + ny * 3.1) * 6  +
      Math.sin(nx * 3.1  - time * 1.3 + ny * 0.9) * 9
    );

  const dy =
    leftAtten * (
      Math.sin(nx * 5.5  - time * 1.9 + ny * 2.2) * 10 +
      Math.sin(nx * 11.0 - time * 3.1 + ny * 4.0) * 4  +
      Math.sin(nx * 2.8  - time * 1.1 + ny * 1.3) * 7  +
      Math.cos(nx * 7.3  - time * 2.6 + ny * 2.8) * 5
    );

  return [dx, dy];
}

function lerp(a, b, t) { return a + (b - a) * t; }

function colorAtRow(normY) {
  // normY: 0 top (blue), 1 bottom (yellow)
  if (normY < 0.5) return BLUE;
  return YELLOW;
}

function lerpColor(c1, c2, t) {
  return [
    Math.round(lerp(c1[0], c2[0], t)),
    Math.round(lerp(c1[1], c2[1], t)),
    Math.round(lerp(c1[2], c2[2], t)),
  ];
}

// Shading: simulate light from upper-left
function shade(color, nx, dx, dy) {
  // surface normal approximation from displacement gradient
  const lightX = 0.6, lightY = -0.8;
  // simple: brighter on left-leaning surfaces, darker on right
  const dot = lightX * (-dx * 0.04) + lightY * (dy * 0.04);
  const brightness = 1.0 + dot * 0.35;
  return [
    Math.min(255, Math.max(0, Math.round(color[0] * brightness))),
    Math.min(255, Math.max(0, Math.round(color[1] * brightness))),
    Math.min(255, Math.max(0, Math.round(color[2] * brightness))),
  ];
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Flag occupies full viewport
  const fw = W, fh = H;
  const ox = 0, oy = 0;

  const cw = fw / cols;
  const ch = fh / rows;

  // Precompute displaced mesh positions
  for (let r = 0; r <= rows; r++) {
    for (let c = 0; c <= cols; c++) {
      const [dx, dy] = wave(c, r, t);
      mesh[r][c].x = ox + c * cw + dx;
      mesh[r][c].y = oy + r * ch + dy;
    }
  }

  // Draw quads
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const p0 = mesh[r][c];
      const p1 = mesh[r][c + 1];
      const p2 = mesh[r + 1][c + 1];
      const p3 = mesh[r + 1][c];

      const normY = (r + 0.5) / rows;
      const normX = (c + 0.5) / cols;

      // Blend color near the seam for a soft edge
      let color;
      const seam = 0.5;
      const blend = 0.012;
      if (normY < seam - blend) {
        color = BLUE;
      } else if (normY > seam + blend) {
        color = YELLOW;
      } else {
        const f = (normY - (seam - blend)) / (blend * 2);
        color = lerpColor(BLUE, YELLOW, f);
      }

      // Displacement for shading
      const [dx, dy] = wave(c + 0.5, r + 0.5, t);
      const shaded = shade(color, normX, dx, dy);

      // Very subtle vignette at edges
      const vx = Math.abs(normX - 0.5) * 2;
      const vy = Math.abs(normY - 0.5) * 2;
      const vignette = 1 - (vx * vx + vy * vy) * 0.07;

      const r2 = Math.round(shaded[0] * vignette);
      const g2 = Math.round(shaded[1] * vignette);
      const b2 = Math.round(shaded[2] * vignette);

      ctx.fillStyle = `rgb(${r2},${g2},${b2})`;
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.lineTo(p2.x, p2.y);
      ctx.lineTo(p3.x, p3.y);
      ctx.closePath();
      ctx.fill();
    }
  }

  t += 0.018;
  requestAnimationFrame(draw);
}

window.addEventListener('resize', resize);
resize();
draw();
</script>
</body>
</html>
